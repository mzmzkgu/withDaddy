<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아빠랑!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍👧</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b093a044d3588e80dcd7beb34e6468d3&libraries=services&autoload=false"></script>
<style>
:root{
  --primary:#FF6B35;--primary-light:#FFF0E8;--primary-dark:#E55A28;
  --accent:#4ECDC4;--bg:#FAFAF8;--bg2:#F0F0EE;
  --card:#FFFFFF;--text:#2D2D2D;--text-l:#999;--text-m:#666;
  --border:#EEEEEE;--vis:#A8D8EA;--vis-d:#6BB5D1;
  --fav:#FFD93D;--fav-d:#F0C808;--danger:#FF6B6B;
  --shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 4px 20px rgba(0,0,0,.12);
  --r:14px;--rs:8px;--nav-h:52px;--tab-h:54px;
  --sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#1A1A2E;--bg2:#16213E;--card:#222244;
  --text:#E8E8EE;--text-l:#8888AA;--text-m:#AAAACC;
  --border:#333355;--shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-lg:0 4px 20px rgba(0,0,0,.4);--primary-light:#3A2520;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;transition:background .3s,color .3s}

/* ═══ HEADER ═══ */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:100;padding:0 12px;transition:background .3s}
.hdr-logo{height:34px;object-fit:contain}
.hdr-r{display:flex;gap:6px}
.ib{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-m);transition:all .2s}
.ib:active{transform:scale(.9)}

/* ═══ SETTINGS ═══ */
.sd{display:none;position:fixed;top:calc(var(--nav-h)+4px);right:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px 0;box-shadow:var(--shadow-lg);z-index:150;min-width:170px}
.sd.show{display:block}
.si{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;cursor:pointer;color:var(--text)}
.ts{width:38px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .2s;cursor:pointer}
.ts.on{background:var(--primary)}
.ts::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.ts.on::after{transform:translateX(18px)}

/* ═══ TAB BAR ═══ */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h)+var(--sab));padding-bottom:var(--sab);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;transition:background .3s}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;border:none;background:none;color:var(--text-l);font-size:10px;font-weight:600;font-family:inherit}
.ti.active{color:var(--primary)}
.ti .tico{font-size:20px;line-height:1}
.ti.active .tico{transform:scale(1.1)}

/* ═══ MAIN ═══ */
.main{position:fixed;top:var(--nav-h);bottom:calc(var(--tab-h)+var(--sab));left:0;right:0;overflow:hidden}
.page{display:none;height:100%;flex-direction:column}
.page.active{display:flex}
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ═══ SEARCH ═══ */
.sb{padding:8px 14px;flex-shrink:0}
.sw{display:flex;align-items:center;background:var(--bg2);border-radius:10px;padding:0 12px}
.sw .si2{font-size:14px;color:var(--text-l);margin-right:6px}
.sinp{flex:1;border:none;background:none;padding:9px 0;font-size:13px;font-family:inherit;color:var(--text)}
.sinp:focus{outline:none}
.sinp::placeholder{color:var(--text-l)}

/* ═══ FILTER CHIPS ═══ */
.fb{padding:4px 14px 6px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.fb::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;padding:5px 11px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text-m);transition:all .2s}
.fc.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}

/* ═══ SORT BAR ═══ */
.sortb{padding:2px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cnt{font-size:11px;color:var(--text-l);font-weight:600}
.ss{font-size:11px;color:var(--text-m);background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:inherit}

/* ═══ BOTTOM SHEET MODAL ═══ */
.bso{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
.bso.show{display:block}
.bs{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;max-height:50vh;display:flex;flex-direction:column;z-index:201;animation:bsup .2s ease;padding-bottom:var(--sab)}
@keyframes bsup{from{transform:translateY(100%)}}
.bs-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:8px auto 4px}
.bs-title{font-size:14px;font-weight:700;padding:6px 16px 8px}
.bs-list{flex:1;overflow-y:auto;padding:0 16px}
.bs-item{padding:11px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.bs-item:last-child{border-bottom:none}
.bs-item .bchk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;flex-shrink:0}
.bs-item.sel .bchk{background:var(--primary);border-color:var(--primary);color:#fff}
.bs-btn{margin:8px 16px 12px;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}

/* ═══ PLACE CARD ═══ */
.pl{padding:0 14px 14px}
.pc{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:9px;box-shadow:var(--shadow);border-left:4px solid transparent;transition:background .3s}
.pc.vc{border-left-color:var(--vis-d)}
.pc.fvc{border-left-color:var(--fav-d)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.cn{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.cn a{color:inherit;text-decoration:none}
.cst{flex-shrink:0;font-size:13px;font-weight:700;color:var(--primary)}
.cst .st{color:var(--fav)}
.cm{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.tl{background:#E8F4FD;color:#2B7CB3}.tc{background:#F3E8FF;color:#8B5CF6}
.tt{background:#FFF3E0;color:#E67E22}.tf{background:#E8F5E9;color:#27AE60}
.tp{background:#FCE4EC;color:#C0392B}.tr{background:#FFF8E1;color:#F39C12}
[data-theme="dark"] .tl{background:#1a3040}[data-theme="dark"] .tc{background:#2a1a40}
[data-theme="dark"] .tt{background:#3a2a10}[data-theme="dark"] .tf{background:#1a3a1a}
[data-theme="dark"] .tp{background:#3a1a1a}[data-theme="dark"] .tr{background:#3a3010}
.cfe{font-size:12px;color:var(--text-m);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.car{display:flex;justify-content:space-between;align-items:center}
.cbs{display:flex;gap:5px}
.cbtn{height:28px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;gap:3px;padding:0 9px;cursor:pointer;font-size:11px;font-family:inherit;color:var(--text-m);transition:all .15s}
.cbtn:active{transform:scale(.94)}
.cbtn.fo{background:var(--fav);border-color:var(--fav-d);color:#333}
.cbtn.vo{background:var(--vis);border-color:var(--vis-d);color:#333}
.cmb{font-size:11px;color:var(--text-l);cursor:pointer;border:none;background:none;font-family:inherit;padding:4px}
.cd{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:12px;color:var(--text-m);line-height:1.6}
.cd.show{display:block}
.dr{display:flex;gap:5px;margin-bottom:3px}.dl{font-weight:700;flex-shrink:0;min-width:48px;color:var(--text)}
.dr a{color:var(--primary);text-decoration:none;word-break:break-all}
.da{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.dab{flex:1;padding:7px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-m);display:flex;align-items:center;justify-content:center;gap:3px}
.dab:active{background:var(--bg2)}
.dab.db{color:var(--danger);border-color:var(--danger)}
.distb{font-size:10px;color:var(--accent);font-weight:600;margin-left:4px}
.es{text-align:center;padding:50px 20px;color:var(--text-l)}
.es .ej{font-size:40px;margin-bottom:8px}
.es p{font-size:13px;line-height:1.5}

/* ═══ MAP ═══ */
#mc{flex:1;position:relative}
#km{height:100%;width:100%}
.ml{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.92);border-radius:var(--rs);padding:5px 8px;font-size:9px;z-index:5;box-shadow:var(--shadow);display:flex;gap:8px}
[data-theme="dark"] .ml{background:rgba(34,34,68,.92)}
.li{display:flex;align-items:center;gap:3px}
.ld{width:8px;height:8px;border-radius:50%}
.dd{background:var(--primary)}.df{background:var(--fav-d)}.dv{background:var(--vis-d)}
.mlb{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:5;box-shadow:var(--shadow)}

/* ═══ FORM ═══ */
.fp{padding:14px}
.fs{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:3px}
.fi{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--card);color:var(--text);transition:border-color .2s}
.fi:focus{outline:none;border-color:var(--primary)}
.fr{display:flex;gap:8px}
.fr>.fs{flex:1}
/* custom select */
.csel{position:relative;cursor:pointer}
.csel-val{width:100%;padding:9px 28px 9px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--card);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csel-val::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-l)}
.csel-val.placeholder{color:var(--text-l)}
.asw{display:flex;gap:6px}
.asw .fi{flex:1}
.asb{flex-shrink:0;padding:0 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.ar{margin-top:5px;font-size:11px;color:var(--accent);display:none}
.ar.show{display:block}
.subb{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.subb:active{opacity:.85}
.cw{display:flex;align-items:flex-start;gap:8px;padding:10px;background:var(--bg2);border-radius:var(--rs);margin-bottom:10px;font-size:11px;color:var(--text-m);line-height:1.4}
.cw input[type="checkbox"]{margin-top:1px;width:18px;height:18px;flex-shrink:0;accent-color:var(--primary)}
.sci{display:flex;gap:3px}
.scs{font-size:24px;cursor:pointer;color:var(--border);transition:color .12s}
.scs.lit{color:var(--fav)}

/* ═══ DATA MGMT ═══ */
.dm{padding:14px;border-top:1px solid var(--border)}
.dmt{font-size:11px;font-weight:700;color:var(--text-l);margin-bottom:6px}
.dbs{display:flex;gap:6px}
.dbb{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-m)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:calc(var(--tab-h)+var(--sab)+12px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ LOADING ═══ */
.lo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:250;justify-content:center;align-items:center}
.lo.show{display:flex}
.lsp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.ad{display:none;width:100%;height:50px;background:var(--bg2);border-bottom:1px solid var(--border);text-align:center;line-height:50px;font-size:10px;color:var(--text-l);flex-shrink:0}

@media(min-width:600px){.main,.hdr,.tab-bar,.bs{max-width:500px;margin-left:auto;margin-right:auto;left:0;right:0}}
</style>
</head>
<body>

<div class="hdr">
  <img src="logo.png" alt="아빠랑!" class="hdr-logo" onerror="this.outerHTML='<h1 style=&quot;font-size:18px;font-weight:800;background:linear-gradient(135deg,#FF6B35,#FF8F65);-webkit-background-clip:text;-webkit-text-fill-color:transparent&quot;>👨‍👧 아빠랑!</h1>'">
  <div class="hdr-r"><button class="ib" onclick="toggleSet()">⚙️</button></div>
</div>
<div class="sd" id="sd">
  <div class="si" onclick="toggleDark()"><span>🌙 다크 모드</span><div class="ts" id="dt"></div></div>
</div>
<div class="ad">광고 영역</div>

<div class="main">
  <!-- LIST -->
  <div class="page active" id="p-list">
    <div class="sb"><div class="sw"><span class="si2">🔍</span><input class="sinp" id="si" placeholder="장소명, 지역 검색"></div></div>
    <div class="fb" id="fb">
      <button class="fc" data-f="region">📍 지역 ▾</button>
      <button class="fc" data-f="category">🏷️ 유형 ▾</button>
      <button class="fc" data-f="target">👶 타겟 ▾</button>
      <button class="fc" data-f="fee">💰 요금 ▾</button>
      <button class="fc" data-f="score">⭐ 별점 ▾</button>
      <button class="fc" data-f="reservation">📋 예약 ▾</button>
    </div>
    <div class="sortb"><div class="cnt" id="cnt">총 0곳</div><select class="ss" id="srt" onchange="rl()"><option value="score">별점순</option><option value="name">이름순</option><option value="dist">거리순</option></select></div>
    <div class="page-scroll"><div class="pl" id="plist"></div></div>
  </div>
  <!-- MAP -->
  <div class="page" id="p-map">
    <div id="mc"><div id="km"></div>
      <button class="mlb" onclick="goMy()">📍</button>
      <div class="ml"><div class="li"><div class="ld dd"></div>일반</div><div class="li"><div class="ld df"></div>찜</div><div class="li"><div class="ld dv"></div>다녀옴</div></div>
    </div>
  </div>
  <!-- MY -->
  <div class="page" id="p-my">
    <div class="sb"><div class="sw"><span class="si2">🔍</span><input class="sinp" id="msi" placeholder="다녀온 곳 검색"></div></div>
    <div class="sortb"><div class="cnt" id="mcnt">다녀온 곳 0곳</div></div>
    <div class="page-scroll"><div class="pl" id="mlist"></div></div>
    <div class="dm"><div class="dmt">📦 데이터 관리</div><div class="dbs">
      <button class="dbb" onclick="expD()">💾 내보내기</button>
      <button class="dbb" onclick="document.getElementById('impf').click()">📂 가져오기</button>
      <button class="dbb" style="color:var(--danger)" onclick="clrAll()">🗑️ 초기화</button>
    </div><input type="file" id="impf" accept=".json" style="display:none" onchange="impD(event)"></div>
  </div>
  <!-- NEW -->
  <div class="page" id="p-new">
    <div class="page-scroll"><div class="fp">
      <!-- 장소이름 + 유형 -->
      <div class="fr">
        <div class="fs" style="flex:2"><div class="fl">📌 장소 이름 *</div><input class="fi" id="fn" placeholder="예: 서울숲 놀이터" maxlength="30"></div>
        <div class="fs" style="flex:1"><div class="fl">🏷️ 유형 *</div><div class="csel" onclick="openBS('f-category')"><div class="csel-val placeholder" id="fca-val">선택</div></div></div>
      </div>
      <div class="fs"><div class="fl">🔗 링크</div><input class="fi" id="flk" placeholder="https://..." type="url"></div>
      <div class="fs"><div class="fl">📍 주소 검색 *</div><div class="asw"><input class="fi" id="fad" placeholder="주소 또는 장소명 입력"><button class="asb" onclick="srcAddr()">검색</button></div><div class="ar" id="ares"></div></div>
      <!-- 시/도 + 구/군 -->
      <div class="fr">
        <div class="fs"><div class="fl">🏙️ 시/도 *</div><div class="csel" onclick="openBS('f-city')"><div class="csel-val placeholder" id="fci-val">선택</div></div></div>
        <div class="fs"><div class="fl">📍 구/군</div><div class="csel" onclick="openBS('f-district')"><div class="csel-val placeholder" id="fdi-val">선택</div></div></div>
      </div>
      <!-- 타겟 + 연령 -->
      <div class="fr">
        <div class="fs"><div class="fl">👶 타겟</div><div class="csel" onclick="openBS('f-target')"><div class="csel-val" id="fta-val">모두</div></div></div>
        <div class="fs"><div class="fl">🎂 연령</div><div class="csel" onclick="openBS('f-age')"><div class="csel-val" id="fag-val">전연령</div></div></div>
      </div>
      <!-- 예약 + 요금 -->
      <div class="fr">
        <div class="fs"><div class="fl">📋 예약</div><div class="csel" onclick="openBS('f-res')"><div class="csel-val" id="fre-val">불필요</div></div></div>
        <div class="fs"><div class="fl">💰 요금</div><div class="csel" onclick="openBS('f-fee')"><div class="csel-val" id="ffe-val">무료</div></div></div>
      </div>
      <div id="fed" style="display:none">
        <div class="fr">
          <div class="fs"><div class="fl">어른 💰</div><input class="fi" id="ffa" placeholder="5,000원" maxlength="15"></div>
          <div class="fs"><div class="fl">아이 💰</div><input class="fi" id="ffc" placeholder="3,000원" maxlength="15"></div>
        </div>
      </div>
      <!-- 주차 + 링크 -->
      <div class="fr">
        <div class="fs"><div class="fl">🅿️ 주차 정보</div><input class="fi" id="fpk" placeholder="무료주차 가능" maxlength="25"></div>
        <div class="fs"><div class="fl">🅿️ 주차링크</div><input class="fi" id="fpkl" placeholder="https://..." type="url"></div>
      </div>
      <div class="fs"><div class="fl">✨ 한줄 특징 (20자)</div><input class="fi" id="fft" placeholder="아이와 숲속 모험!" maxlength="20"></div>
      <!-- 맛집 + 링크 -->
      <div class="fr">
        <div class="fs"><div class="fl">🍽️ 근처 맛집</div><input class="fi" id="frs" placeholder="미소식당(키즈존)" maxlength="30"></div>

function openBS(type){
  bsType=type;

  if(!cfg) return;

  if(type==='f-district'){
    const city=FV['f-city'];
    cfg={title:'📍 구/군 선택',opts: city&&DISTRICTS[city]? [...DISTRICTS[city],'기타(직접입력)'] : ['시/도를 먼저 선택하세요']};
  }
  document.getElementById('bs-title').textContent=cfg.title;
  const cur = type.startsWith('f-')? FV[type] : AF[type.replace('f-','')];
  const isFilter = !type.startsWith('f-');
  bsSel = isFilter ? (cur||'전체') : (cur||cfg.opts[0]);
  
  document.getElementById('bs-list').innerHTML=cfg.opts.map(o=>{
    const s=(bsSel===o)?'sel':'';
    return`<div class="bs-item ${s}" data-v="${o}" onclick="bsSelect(this)"><span>${o}</span><div class="bchk">${s?'✓':''}</div></div>`;
  }).join('');
  document.getElementById('bso').classList.add('show');
  document.getElementById('bs').style.display='flex';
}
function bsSelect(el){
  el.parentElement.querySelectorAll('.bs-item').forEach(x=>{x.classList.remove('sel');x.querySelector('.bchk').textContent='';});

  bsSel=el.dataset.v;
}

    // filter
    AF[bsType]=bsSel==='전체'?'':bsSel;
    upFC();
    rl();
  }
}

async function init(){loadLS();initTh();setupTabs();setupF();setupSr();setupSc();getLoc();await loadDB();rl();}
function loadLS(){try{const s=localStorage.getItem('abr_s');if(s)US=JSON.parse(s);const l=localStorage.getItem('abr_p');if(l)LP=JSON.parse(l);}catch(e){}}

function initTh(){if(localStorage.getItem('abr_t')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('dt').classList.add('on');}}
function toggleDark(){const e=document.getElementById('dt');e.classList.toggle('on');const d=e.classList.contains('on');document.documentElement.setAttribute('data-theme',d?'dark':'');localStorage.setItem('abr_t',d?'dark':'light');}
function toggleSet(){const d=document.getElementById('sd');d.classList.toggle('show');if(d.classList.contains('show'))setTimeout(()=>document.addEventListener('click',e=>{if(!d.contains(e.target))d.classList.remove('show');},{once:true}),0);}
function getLoc(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{mLat=p.coords.latitude;mLng=p.coords.longitude;hasLoc=true;rl();},()=>{},{enableHighAccuracy:false,timeout:5000});}
function cDist(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
async function loadDB(){document.getElementById('lo').classList.add('show');try{const r=await fetch(CFG.API+'/places',{mode:'cors'});const d=await r.json();if(d.ok&&d.places)P=d.places;}catch(e){try{const c=localStorage.getItem('abr_c');if(c)P=JSON.parse(c);}catch(e2){}if(!P.length)P=sampleD();}if(P.length)localStorage.setItem('abr_c',JSON.stringify(P));document.getElementById('lo').classList.remove('show');}

function sampleD(){return[{id:'s1',name:'서울숲',link:'https://parks.seoul.go.kr',city:'서울',district:'성동구',category:'공원',target:'모두',age:'전연령',reservation:'불필요',feeType:'무료',feeAdult:'',feeChild:'',parking:'주차장 있음(유료)',parkingLink:'',feature:'도심 속 자연 놀이터!',restaurant:'서울숲카페(키즈존)',restaurantLink:'',lat:37.5443,lng:127.0374,score:4.5},{id:'s2',name:'국립중앙박물관',link:'https://www.museum.go.kr',city:'서울',district:'용산구',category:'박물관',target:'모두',age:'7~9세',reservation:'불필요',feeType:'무료',feeAdult:'',feeChild:'',parking:'지하주차장(유료)',parkingLink:'',feature:'역사 체험 최고!',restaurant:'박물관 푸드코트',restaurantLink:'',lat:37.5239,lng:126.9804,score:4},{id:'s3',name:'에버랜드',link:'https://www.everland.com',city:'경기',district:'용인시',category:'체험',target:'모두',age:'4~6세',reservation:'권장',feeType:'유료',feeAdult:'62,000원',feeChild:'48,000원',parking:'대형주차장(유료)',parkingLink:'',feature:'놀이기구 천국!',restaurant:'에버랜드 내 식당',restaurantLink:'',lat:37.2942,lng:127.2024,score:5},{id:'s4',name:'부산 해운대',link:'',city:'부산',district:'해운대구',category:'실외',target:'모두',age:'전연령',reservation:'불필요',feeType:'무료',feeAdult:'',feeChild:'',parking:'공영주차장',parkingLink:'',feature:'모래 놀이의 성지!',restaurant:'해운대 횟집거리',restaurantLink:'',lat:35.1587,lng:129.1604,score:4},{id:'s5',name:'키즈카페 플레이팩토리',link:'',city:'서울',district:'강남구',category:'키즈카페',target:'모두',age:'0~3세',reservation:'필요',feeType:'유료',feeAdult:'무료',feeChild:'15,000원',parking:'건물 내 주차',parkingLink:'',feature:'영유아 전용 놀이!',restaurant:'1층 분식점',restaurantLink:'',lat:37.4979,lng:127.0276,score:3.5}];}

function upFC(){const lb={region:'📍 지역',category:'🏷️ 유형',target:'👶 타겟',fee:'💰 요금',score:'⭐ 별점',reservation:'📋 예약'};document.querySelectorAll('.fc').forEach(c=>{const f=c.dataset.f,v=AF[f];c.classList.toggle('active',v!=='');c.textContent=v?`${lb[f].split(' ')[0]} ${v} ✕`:`${lb[f]} ▾`;if(v)c.onclick=()=>{if(c.textContent.includes('✕')){AF[f]='';upFC();rl();}else openBS(f);};else c.onclick=()=>openBS(f);});}
function gF(){const q=(document.getElementById('si').value||'').trim().toLowerCase();return allP().filter(p=>{if(q&&!p.name.toLowerCase().includes(q)&&!(p.city||'').includes(q)&&!(p.district||'').includes(q))return false;if(AF.region&&p.city!==AF.region)return false;if(AF.category&&p.category!==AF.category)return false;if(AF.target&&AF.target!=='모두'&&p.target!==AF.target&&p.target!=='모두')return false;if(AF.fee&&p.feeType!==AF.fee)return false;if(AF.reservation&&p.reservation!==AF.reservation)return false;if(AF.score){if((p.score||0)<parseFloat(AF.score))return false;}return true;});}

// ═══ RENDER ═══
function rl(){let f=gF();const s=document.getElementById('srt').value;if(s==='dist'){f.forEach(p=>{p._d=(p.lat&&p.lng)?cDist(mLat,mLng,p.lat,p.lng):9999;});f.sort((a,b)=>a._d-b._d);}else if(s==='score')f.sort((a,b)=>(b.score||0)-(a.score||0));else f.sort((a,b)=>a.name.localeCompare(b.name,'ko'));document.getElementById('cnt').textContent=`총 ${f.length}곳`;const w=document.getElementById('plist');if(!f.length){w.innerHTML='<div class="es"><div class="ej">🔍</div><p>조건에 맞는 장소가 없어요</p></div>';return;}w.innerHTML=f.map(cH).join('');}
function rml(){const q=(document.getElementById('msi').value||'').trim().toLowerCase();let l=allP().filter(p=>US.v[p.id]);if(q)l=l.filter(p=>p.name.toLowerCase().includes(q)||(p.city||'').includes(q));document.getElementById('mcnt').textContent=`다녀온 곳 ${l.length}곳`;const w=document.getElementById('mlist');if(!l.length){w.innerHTML='<div class="es"><div class="ej">👣</div><p>아직 다녀온 곳이 없어요</p></div>';return;}w.innerHTML=l.map(cH).join('');}
function cH(p){const iF=US.f[p.id],iV=US.v[p.id],cl=iV?'vc':(iF?'fvc':''),dist=(p._d&&p._d<9999)?`<span class="distb">${p._d<1?(p._d*1000).toFixed(0)+'m':p._d.toFixed(1)+'km'}</span>`:'';const pkH=p.parkingLink?`<a href="${p.parkingLink}" target="_blank">${p.parking||'링크'} ↗</a>`:(p.parking||'-');const rsH=p.restaurantLink?`<a href="${p.restaurantLink}" target="_blank">${p.restaurant||'링크'} ↗</a>`:(p.restaurant||'-');
return`<div class="pc ${cl}"><div class="ct"><div class="cn">${p.link?`<a href="${p.link}" target="_blank">${p.name} ↗</a>`:p.name}${dist}</div><div class="cst"><span class="st">★</span>${p.score||'-'}</div></div><div class="cm"><span class="tg tl">${p.city||''} ${p.district||''}</span>${p.category?`<span class="tg tc">${p.category}</span>`:''}<span class="tg tt">${p.target||'모두'}·${p.age||'전연령'}</span><span class="tg ${p.feeType==='무료'?'tf':'tp'}">${p.feeType||'무료'}</span>${p.reservation&&p.reservation!=='불필요'?`<span class="tg tr">예약${p.reservation}</span>`:''}</div><div class="cfe">✨ ${p.feature||''}</div><div class="car"><div class="cbs"><button class="cbtn ${iF?'fo':''}" onclick="tF('${p.id}')">${iF?'💛':'🤍'} 찜</button><button class="cbtn ${iV?'vo':''}" onclick="tV('${p.id}')">${iV?'✅':'☑️'} 다녀옴</button></div><button class="cmb" onclick="tD('${p.id}')">상세 ▼</button></div><div class="cd" id="d-${p.id}">${p.feeType==='유료'?`<div class="dr"><span class="dl">💰 요금</span><span>어른 ${p.feeAdult||'-'} / 아이 ${p.feeChild||'-'}</span></div>`:''}<div class="dr"><span class="dl">🅿️ 주차</span><span>${pkH}</span></div><div class="dr"><span class="dl">🍽️ 맛집</span><span>${rsH}</span></div>${p.link?`<div class="dr"><span class="dl">🔗 링크</span><span><a href="${p.link}" target="_blank">${p.link.length>25?p.link.substring(0,25)+'...':p.link}</a></span></div>`:''}<div class="da"><button class="dab" onclick="shP('${p.id}')">📤 공유</button><button class="dab" onclick="oIM('${p.id}')">🗺️ 지도</button><button class="dab db" onclick="dlP('${p.id}')">🗑️ 삭제</button></div></div></div>`;}

function tD(id){const e=document.getElementById('d-'+id);e.classList.toggle('show');const b=e.previousElementSibling.querySelector('.cmb');b.textContent=e.classList.contains('show')?'접기 ▲':'상세 ▼';}
function tF(id){US.f[id]=!US.f[id];if(!US.f[id])delete US.f[id];saveS();rl();toast(US.f[id]?'💛 찜 완료!':'찜 해제');}
function tV(id){US.v[id]=!US.v[id];if(!US.v[id])delete US.v[id];saveS();rl();toast(US.v[id]?'✅ 다녀온 곳!':'다녀온 곳 해제');}
function dlP(id){if(!confirm('삭제할까요?'))return;LP=LP.filter(p=>p.id!==id);delete US.f[id];delete US.v[id];saveS();rl();rml();toast('🗑️ 삭제');}
function shP(id){const p=allP().find(x=>x.id===id);if(!p)return;const t=`👨‍👧 아빠랑! 추천\n📌 ${p.name}\n📍 ${p.city} ${p.district}\n⭐ ${p.score}점\n✨ ${p.feature}\n${p.link||''}`;if(navigator.share)navigator.share({title:'아빠랑! - '+p.name,text:t,url:p.link||location.href});else navigator.clipboard.writeText(t).then(()=>toast('📋 복사 완료!'));}
function oIM(id){const p=allP().find(x=>x.id===id);if(!p||!p.lat||!p.lng){toast('위치 정보 없음');return;}document.querySelector('[data-p="p-map"]').click();setTimeout(()=>{if(kMap){kMap.setCenter(new kakao.maps.LatLng(p.lat,p.lng));kMap.setLevel(3);}},300);}

// ═══ MAP ═══
function initKM(){if(typeof kakao==='undefined'||!kakao.maps){document.getElementById('km').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-l);font-size:13px;text-align:center;padding:20px">카카오맵 로드 실패<br>API 키를 확인해주세요</div>';return;}if(kMap){kMap.relayout();upMM();return;}kakao.maps.load(()=>{kMap=new kakao.maps.Map(document.getElementById('km'),{center:new kakao.maps.LatLng(mLat,mLng),level:hasLoc?8:12});upMM();});}
function upMM(){if(!kMap)return;kMks.forEach(m=>m.setMap(null));kMks=[];const f=gF(),b=new kakao.maps.LatLngBounds();let hb=false;f.forEach(p=>{if(!p.lat||!p.lng)return;const pos=new kakao.maps.LatLng(p.lat,p.lng),iF=US.f[p.id],iV=US.v[p.id],col=iV?'#6BB5D1':(iF?'#F0C808':'#FF6B35');const o=new kakao.maps.CustomOverlay({position:pos,content:`<div style="cursor:pointer" onclick="mPop('${p.id}')"><div style="width:26px;height:26px;border-radius:50% 50% 50% 0;background:${col};transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3)"><span style="transform:rotate(45deg);font-size:10px;color:#fff;font-weight:800">${p.score||''}</span></div></div>`,yAnchor:1});o.setMap(kMap);kMks.push(o);b.extend(pos);hb=true;});if(hb)kMap.setBounds(b,40,40,40,40);}
function mPop(id){const p=allP().find(x=>x.id===id);if(p)alert(`📌 ${p.name}\n✨ ${p.feature}\n⭐ ${p.score}점\n📍 ${p.city} ${p.district}`);}
function goMy(){if(!kMap)return;getLoc();setTimeout(()=>{kMap.setCenter(new kakao.maps.LatLng(mLat,mLng));kMap.setLevel(5);},500);}

// ═══ ADDRESS SEARCH ═══
function srcAddr(){const q=document.getElementById('fad').value.trim();if(!q){toast('주소를 입력해주세요');return;}if(typeof kakao==='undefined'||!kakao.maps){toast('카카오맵 SDK 필요');return;}kakao.maps.load(()=>{new kakao.maps.services.Places().keywordSearch(q,(r,st)=>{if(st===kakao.maps.services.Status.OK&&r.length){const x=r[0];fLat=parseFloat(x.y);fLng=parseFloat(x.x);const a=document.getElementById('ares');a.textContent=`✅ ${x.place_name} (${x.address_name})`;a.classList.add('show');aFR(x.address_name);toast('📍 위치 설정!');}else{new kakao.maps.services.Geocoder().addressSearch(q,(r2,st2)=>{if(st2===kakao.maps.services.Status.OK&&r2.length){const x2=r2[0];fLat=parseFloat(x2.y);fLng=parseFloat(x2.x);document.getElementById('ares').textContent=`✅ ${x2.address_name}`;document.getElementById('ares').classList.add('show');aFR(x2.address_name);toast('📍 위치 설정!');}else toast('검색 결과 없음');});}});});}
function aFR(addr){const pts=addr.split(' '),cm={'서울':'서울','서울특별시':'서울','경기':'경기','경기도':'경기','인천':'인천','인천광역시':'인천','부산':'부산','부산광역시':'부산','대구':'대구','대구광역시':'대구','광주':'광주','광주광역시':'광주','대전':'대전','대전광역시':'대전','울산':'울산','울산광역시':'울산','세종':'세종','세종특별자치시':'세종','강원':'강원','강원도':'강원','강원특별자치도':'강원','충북':'충북','충청북도':'충북','충남':'충남','충청남도':'충남','전북':'전북','전라북도':'전북','전북특별자치도':'전북','전남':'전남','전라남도':'전남','경북':'경북','경상북도':'경북','경남':'경남','경상남도':'경남','제주':'제주','제주특별자치도':'제주'};if(pts[0]&&cm[pts[0]]){FV['f-city']=cm[pts[0]];document.getElementById('fci-val').textContent=cm[pts[0]];document.getElementById('fci-val').classList.remove('placeholder');}if(pts[1]){FV['f-district']=pts[1];document.getElementById('fdi-val').textContent=pts[1];document.getElementById('fdi-val').classList.remove('placeholder');}}

// ═══ ADD PLACE ═══
function setupSc(){document.querySelectorAll('.scs').forEach(s=>s.addEventListener('click',()=>{fSc=parseInt(s.dataset.v);document.querySelectorAll('.scs').forEach(x=>x.classList.toggle('lit',parseInt(x.dataset.v)<=fSc));}));}
async function addP(){const nm=document.getElementById('fn').value.trim();if(!nm){toast('⚠️ 장소 이름 입력');return;}if(!FV['f-city']){toast('⚠️ 시/도 선택');return;}if(!FV['f-category']){toast('⚠️ 유형 선택');return;}
const p={id:'u'+Date.now(),name:nm,link:document.getElementById('flk').value.trim(),city:FV['f-city'],district:FV['f-district'],category:FV['f-category'],target:FV['f-target'],age:FV['f-age'],reservation:FV['f-res'],feeType:FV['f-fee'],feeAdult:document.getElementById('ffa').value.trim(),feeChild:document.getElementById('ffc').value.trim(),parking:document.getElementById('fpk').value.trim(),parkingLink:document.getElementById('fpkl').value.trim(),feature:document.getElementById('fft').value.trim()||'재밌는 곳!',restaurant:document.getElementById('frs').value.trim(),restaurantLink:document.getElementById('frsl').value.trim(),lat:fLat,lng:fLng,score:fSc||3};
LP.push(p);saveS();
if(document.getElementById('fcon').checked){try{await fetch(CFG.API+'/submit',{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});toast('✅ 등록+제보 완료!');}catch(e){toast('✅ 로컬 저장 (서버 제보 실패)');}}else toast('✅ 내 기기에 저장!');
// reset
document.querySelectorAll('#p-new .fi').forEach(e=>e.value='');
FV={'f-city':'','f-district':'','f-category':'','f-target':'모두','f-age':'전연령','f-res':'불필요','f-fee':'무료'};
['fci','fdi','fca'].forEach(k=>{const e=document.getElementById(k+'-val');e.textContent='선택';e.classList.add('placeholder');});
document.getElementById('fta-val').textContent='모두';document.getElementById('fag-val').textContent='전연령';
document.getElementById('fre-val').textContent='불필요';document.getElementById('ffe-val').textContent='무료';
fSc=0;fLat=0;fLng=0;document.querySelectorAll('.scs').forEach(s=>s.classList.remove('lit'));
document.getElementById('fed').style.display='none';document.getElementById('ares').classList.remove('show');
document.getElementById('fcon').checked=false;
setTimeout(()=>document.querySelector('[data-p="p-list"]').click(),800);}

// ═══ DATA MGMT ═══
function expD(){const d={localPlaces:LP,userState:US,exportDate:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`아빠랑_백업.json`;a.click();URL.revokeObjectURL(a.href);toast('💾 백업!');}
function impD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.localPlaces){if(!confirm(`${d.localPlaces.length}개 가져오기?`))return;const ids=new Set(LP.map(p=>p.id));d.localPlaces.forEach(p=>{if(!ids.has(p.id))LP.push(p);});if(d.userState){Object.assign(US.v,d.userState.v||d.userState.visited||{});Object.assign(US.f,d.userState.f||d.userState.fav||{});}saveS();rl();toast('📂 완료!');}}catch(err){toast('⚠️ 파일 오류');}};r.readAsText(f);e.target.value='';}
function clrAll(){if(!confirm('모든 로컬 데이터 삭제?'))return;if(!confirm('정말 삭제?'))return;LP=[];US={v:{},f:{}};saveS();rl();rml();toast('🗑️ 초기화');}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
init();
</script>
</body>
